name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish Project
      run: dotnet publish NotebookApp/NotebookApp.csproj -c Release -o release

    - name: Create Smart 404 Page
      run: |
        cat << 'EOF' > release/wwwroot/404.html
        <!DOCTYPE html>
        <html>
        <head>
          <meta charset="utf-8">
          <title>NotebookApp</title>
          <script type="text/javascript">
            var repoName = '/NotebookApp';
            var l = window.location;
            var pathWithoutRepo = l.pathname.slice(repoName.length);
            l.replace(
              l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
              repoName + '/?p=' + encodeURIComponent(pathWithoutRepo) +
              (l.search ? '&' + l.search.slice(1) : '') +
              l.hash
            );
          </script>
        </head>
        <body>
        </body>
        </html>
        EOF

    - name: Add .nojekyll file
      run: touch release/wwwroot/.nojekyll

    - name: Upload Artifacts
      uses: actions/upload-pages-artifact@v3
      with:
        path: release/wwwroot

  deploy-pages:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
