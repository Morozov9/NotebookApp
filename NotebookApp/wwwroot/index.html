<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NotebookApp</title>
    <base href="/NotebookApp/" />
    <script type="text/javascript">
        (function(l) {
            if (l.search === '') {
                var p = l.pathname.replace('/NotebookApp', '');
                if (p !== '/' && p !== '') {
                    window.location.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/NotebookApp/?p=' + p.replace(/\//g, '%2F'));
                }
            } else if (l.search.startsWith('?p=')) {
                var r = decodeURIComponent(l.search.slice(3));
                window.history.replaceState(null, null, l.pathname + r + l.hash);
            }
        }(window.location))
    </script>
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="notes.png" />
    <link href="NotebookApp.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        window.themeManager = {
            setTheme: function (theme) {
                document.documentElement.setAttribute('data-bs-theme', theme);
            }
        };
    </script>
</body>

</html>
